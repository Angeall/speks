site_name: "Credit Evaluation System"
docs_dir: "docs"
site_dir: "site"

theme:
  name: material
  logo: assets/logo-white.svg
  favicon: assets/logo.svg
  palette:
    primary: custom
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - speks-tags
  - speks-playground
  - speks-dependencies
  - speks-sequence
  - speks-versioning
  - speks-plantuml:
      server: "https://www.plantuml.com/plantuml"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: plantuml
          class: plantuml
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Credit Rules: credit-rules.md
  - Compliance: compliance.md
  - Architecture: architecture.md
