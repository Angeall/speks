name: Build Standalone Binary

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: speks-windows
          - os: ubuntu-latest
            artifact: speks-linux
          - os: macos-latest
            artifact: speks-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[build]"

      - name: Build binary
        run: python scripts/build_binary.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/speks/
          retention-days: 30

      - name: Create release archive (Windows)
        if: github.event_name == 'release' && matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path dist/speks/* -DestinationPath speks-windows.zip

      - name: Create release archive (Linux/macOS)
        if: github.event_name == 'release' && matrix.os != 'windows-latest'
        run: tar -czf speks-${{ matrix.artifact }}.tar.gz -C dist/speks .

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            speks-*.zip
            speks-*.tar.gz
